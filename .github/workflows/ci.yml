name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (no dependencies to install)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify zero runtime dependencies
        run: |
          # polytools must ship with zero dependencies.
          # This step fails the build if any non-stdlib import is introduced.
          python - <<'EOF'
          import importlib, sys, pathlib, ast, os

          src = pathlib.Path("src/polytools")
          stdlib_modules = set(sys.stdlib_module_names)  # Python 3.10+

          third_party = []
          for py_file in src.rglob("*.py"):
              tree = ast.parse(py_file.read_text())
              for node in ast.walk(tree):
                  if isinstance(node, (ast.Import, ast.ImportFrom)):
                      name = (node.names[0].name if isinstance(node, ast.Import)
                              else node.module or "")
                      top = name.split(".")[0]
                      if top and top not in stdlib_modules and top != "polytools":
                          third_party.append(f"{py_file}: {top}")

          if third_party:
              print("FAIL: third-party imports detected:")
              for item in third_party:
                  print(f"  {item}")
              sys.exit(1)
          else:
              print("OK: zero third-party dependencies confirmed")
          EOF
