version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  # pip: only dev dependencies (polytools has no runtime dependencies)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    ignore:
      # Only update patch versions for dev tools automatically
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hatch"
        update-types: ["version-update:semver-major"]
